sources:
  - name: demo_src
    description: Данные из БД авиаперелетов
    tables:
      - name: boarding_passes
        description: Посадочные талоны
        columns:
          - name: ticket_no
            description: Номер билета
          - name: flight_id
            description: Номер рейса
          - name: boarding_no
            description: Номер посадочного талона
          - name: seat_no
            description: Номер места
      - name: flights
        description: Перелеты
        columns:
          - name: flight_id
          - name: flight_no
          - name: scheduled_departure
          - name: scheduled_arrival
          - name: departure_airport
          - name: arrival_airport
          - name: status
          - name: aircraft_code
          - name: actual_departure
          - name: actual_arriva
        freshness:
          warn_after:
            count: 6
            period: hour
          error_after:
            count: 1
            period: day
        loaded_at_field: actual_departure::timestamp
      - name: ticket_flights
        description: Билеты
        columns:
          - name: ticket_no
          - name: flight_id
          - name: fare_conditions
          - name: amount
      - name: tickets
        description: Билеты
        columns:
          - name: ticket_no
          - name: book_ref
          - name: passenger_id
          - name: passenger_name
          - name: contact_data
